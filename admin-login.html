<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Timeout Restaurant — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:        #d4af37;
      --gold-bright: #e8c84a;
      --gold-dim:    rgba(212,175,55,0.12);
      --gold-glow:   rgba(212,175,55,0.28);
      --bg:          #080808;
      --surface:     rgba(255,255,255,0.035);
      --border:      rgba(212,175,55,0.18);
      --text:        #ede8de;
      --text-soft:   #8a857a;
      --error:       #e05555;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 50%, rgba(212,175,55,0.055) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 30%, rgba(212,175,55,0.03) 0%, transparent 60%);
      pointer-events: none;
      animation: ambientShift 12s ease-in-out infinite alternate;
    }
    @keyframes ambientShift {
      from { opacity: 0.7; }
      to   { opacity: 1; }
    }

    /* Noise grain */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.4;
    }

    .scene {
      position: relative; z-index: 1;
      height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%; max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 52px 44px 48px;
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 32px 80px rgba(0,0,0,0.6),
        0 0 60px rgba(212,175,55,0.04);
      animation: cardIn 0.7s cubic-bezier(0.34,1.2,0.64,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 36px;
      animation: fadeDown 0.6s 0.1s ease both;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-ring {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: linear-gradient(135deg, rgba(212,175,55,0.12), rgba(212,175,55,0.03));
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 0 32px rgba(212,175,55,0.1);
      font-size: 26px;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 26px; font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }
    .card-sub {
      font-size: 12px; letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-soft);
      font-weight: 400;
    }

    .field {
      margin-bottom: 18px;
      animation: fadeDown 0.6s ease both;
    }
    .field:nth-child(1) { animation-delay: 0.18s; }
    .field:nth-child(2) { animation-delay: 0.24s; }

    .field label {
      display: block;
      font-size: 10px; letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--text-soft);
      margin-bottom: 9px; font-weight: 500;
    }

    .field input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(212,175,55,0.14);
      border-radius: 12px;
      padding: 14px 18px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 15px; font-weight: 400;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }
    .field input::placeholder { color: var(--text-soft); opacity: 0.55; }
    .field input:focus {
      border-color: rgba(212,175,55,0.45);
      background: rgba(212,175,55,0.04);
      box-shadow: 0 0 0 3px rgba(212,175,55,0.08);
    }

    .login-btn {
      width: 100%; margin-top: 8px;
      padding: 15px;
      background: linear-gradient(135deg, #c9a830 0%, #e8c84a 50%, #c9a830 100%);
      background-size: 200% 100%;
      border: none; border-radius: 12px;
      color: #1a1200;
      font-family: 'Outfit', sans-serif;
      font-size: 13px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(212,175,55,0.3), 0 1px 0 rgba(255,255,255,0.15) inset;
      transition: transform 0.2s, box-shadow 0.2s, background-position 0.4s;
      animation: fadeDown 0.6s 0.3s ease both;
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 36px rgba(212,175,55,0.45), 0 1px 0 rgba(255,255,255,0.2) inset;
      background-position: 100% 0;
    }
    .login-btn:active { transform: translateY(0) scale(0.98); }

    .error-msg {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      background: rgba(224,85,85,0.1);
      border: 1px solid rgba(224,85,85,0.25);
      color: #e07070;
      font-size: 13px; text-align: center;
      display: none;
      animation: shakeIn 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }
    .error-msg.show { display: block; }
    @keyframes shakeIn {
      0%,100% { transform: translateX(0); }
      15%      { transform: translateX(-8px); }
      30%      { transform: translateX(7px); }
      45%      { transform: translateX(-6px); }
      60%      { transform: translateX(5px); }
      75%      { transform: translateX(-3px); }
      90%      { transform: translateX(2px); }
    }

    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      margin: 32px 0 24px;
    }
    .footer-note {
      text-align: center;
      font-size: 11px; color: var(--text-soft);
      letter-spacing: 0.5px; opacity: 0.6;
    }

    /* Page-out transition */
    .page-out {
      animation: pageOut 0.45s cubic-bezier(0.4,0,1,1) forwards;
    }
    @keyframes pageOut {
      to { opacity: 0; transform: scale(0.97) translateY(-12px); }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="card" id="card">
      <div class="logo-wrap">
        <div class="logo-ring">🍽️</div>
        <div class="card-title">Admin Portal</div>
        <div class="card-sub">Timeout Restaurant</div>
      </div>

      <div class="field">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username" autocomplete="off"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" autocomplete="off"/>
      </div>

      <button class="login-btn" id="loginBtn">Enter Dashboard</button>
      <div class="error-msg" id="errorMsg">⚠ Invalid credentials. Please try again.</div>

      <div class="divider"></div>
      <div class="footer-note">Restricted access — authorised personnel only</div>
    </div>
  </div>

  <script>
    // Clear stale session on load
    // (don't auto-redirect here — this IS the login page)

    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');

    function attemptLogin() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value.trim();

      if (u === 'admin' && p === '1234') {
        localStorage.setItem('isAdminLoggedIn', 'true');
        errorMsg.classList.remove('show');
        document.getElementById('card').classList.add('page-out');
        setTimeout(() => { window.location.href = 'admin.html'; }, 420);
      } else {
        errorMsg.classList.remove('show');
        void errorMsg.offsetWidth; // reflow to re-trigger animation
        errorMsg.classList.add('show');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    }

    loginBtn.addEventListener('click', attemptLogin);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });
  </script>
</body>
</html>
